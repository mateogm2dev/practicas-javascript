<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 01 — Detener la recarga</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 0 20px;
    }
    input {
      padding: 8px;
      font-size: 1rem;
      margin-right: 8px;
    }
    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    #resultado {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Práctica 01</h1>
  <p>Escribí tu nombre y hacé click en Enviar. Observá la consola.</p>

  <form id="miForm">
    <input type="text" id="nombre" placeholder="Tu nombre">
    <button type="submit">Enviar</button>
  </form>

  <p id="resultado"></p>

  <script>
    const form = document.querySelector("#miForm");

    form.addEventListener("submit", (e) => {
      // TODO 1: Agregá e.preventDefault() acá para detener la recarga.
      e.preventDefault();
      console.log("¡El handler se ejecutó!");

      // TODO 2: Leé el valor del input #nombre y mostralo en #resultado.
      const texto = document.querySelector("#nombre").value;
      document.querySelector("#resultado").textContent = "Escribiste: " + texto;
    });
  </script>

</body>
</html>
