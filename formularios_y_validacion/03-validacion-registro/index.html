<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 03 — Formulario de registro</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 440px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .campo {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }

    input {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .error {
      color: red;
      font-size: 0.9rem;
      min-height: 1.2em;
      display: block;
      margin-top: 4px;
    }

    button {
      padding: 10px 24px;
      font-size: 1rem;
      cursor: pointer;
    }

    #exito {
      margin-top: 20px;
      color: #1a7a1a;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

  <h1>Registro</h1>

  <form id="formRegistro">

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo">
      <span class="error" id="error-nombre"></span>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input type="text" id="email" placeholder="tu@email.com">
      <span class="error" id="error-email"></span>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      <span class="error" id="error-password"></span>
    </div>

    <button type="submit">Registrarse</button>

  </form>

  <p id="exito"></p>

  <script>
    function validarNombre(valor) {
      valor = valor.trim();

      if (valor === "") {
        return "El nombre es obligatorio.";
      }

      if (valor.length < 3) {
        return "Debe tener al menos 3 caracteres.";
      }

      return null;
    }

    function validarEmail(valor) {
      valor = valor.trim();

      if (valor === "") {
        return "El email es obligatorio.";
      }

      if (!valor.includes("@")) {
        return "El email no es válido.";
      }

      return null;
    }

    function validarPassword(valor) {
      if (valor.length < 6) {
        return "La contraseña debe tener al menos 6 caracteres.";
      }

      return null;
    }

    const form = document.querySelector("#formRegistro");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const nombre = document.querySelector("#nombre").value;
      const email = document.querySelector("#email").value;
      const password = document.querySelector("#password").value;

      const errorNombre = validarNombre(nombre);
      const errorEmail = validarEmail(email);
      const errorPassword = validarPassword(password);

      document.querySelector("#error-nombre").textContent = errorNombre || "";
      document.querySelector("#error-email").textContent = errorEmail || "";
      document.querySelector("#error-password").textContent = errorPassword || "";

      if (!errorNombre && !errorEmail && !errorPassword) {
        document.querySelector("#exito").textContent =
          "¡Registro realizado correctamente!";
      } else {
        document.querySelector("#exito").textContent = "";
      }
    });
  </script>

</body>

</html>
